<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechFix by [Your Name] – Software Help & Vlogs</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg:        #0D0F14;
      --surface:   #151820;
      --card:      #1C202B;
      --border:    #252933;
      --accent:    #00D4FF;
      --accent2:   #7B61FF;
      --green:     #00E57B;
      --text:      #E8EAF0;
      --muted:     #7A8099;
      --font-head: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
    }
 
    html { scroll-behavior: smooth; }
 
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }
 
    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem;
      background: rgba(13,15,20,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: var(--font-head);
      font-size: 1.25rem; font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }
    .nav-logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      color: var(--muted); text-decoration: none;
      font-size: 0.9rem; font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent); }
    .nav-cta {
      background: var(--accent); color: #0D0F14;
      padding: 0.45rem 1.1rem; border-radius: 6px;
      font-size: 0.88rem; font-weight: 600;
      text-decoration: none; transition: opacity 0.2s;
    }
    .nav-cta:hover { opacity: 0.85; }
 
    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 7rem 1.5rem 4rem;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; top: -200px; left: 50%; transform: translateX(-50%);
      width: 800px; height: 800px;
      background: radial-gradient(ellipse, rgba(0,212,255,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.25);
      color: var(--accent);
      font-size: 0.8rem; font-weight: 600; letter-spacing: 0.05em;
      padding: 0.35rem 0.9rem; border-radius: 100px;
      margin-bottom: 1.5rem; text-transform: uppercase;
    }
    .hero-badge::before { content: '●'; font-size: 0.55rem; animation: blink 1.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
 
    .hero h1 {
      font-family: var(--font-head);
      font-size: clamp(2.2rem, 6vw, 4.5rem);
      font-weight: 700; line-height: 1.1;
      margin-bottom: 1.25rem;
    }
    .hero h1 .line2 { color: var(--accent); display: block; }
 
    .hero p {
      max-width: 560px; margin: 0 auto 2.5rem;
      color: var(--muted); font-size: 1.1rem; line-height: 1.7;
    }
    .hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .btn-primary {
      background: var(--accent); color: #0D0F14;
      padding: 0.75rem 1.75rem; border-radius: 8px;
      font-weight: 700; font-size: 0.95rem;
      text-decoration: none; transition: transform 0.15s, opacity 0.2s;
    }
    .btn-primary:hover { transform: translateY(-2px); opacity: 0.9; }
    .btn-secondary {
      border: 1px solid var(--border); color: var(--text);
      padding: 0.75rem 1.75rem; border-radius: 8px;
      font-weight: 600; font-size: 0.95rem;
      text-decoration: none; transition: border-color 0.2s, color 0.2s;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
 
    /* ── SERVICES ── */
    .section { padding: 5rem 1.5rem; max-width: 1100px; margin: 0 auto; }
    .section-label {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 0.75rem;
    }
    .section-title {
      font-family: var(--font-head);
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 700; margin-bottom: 0.75rem;
    }
    .section-sub { color: var(--muted); max-width: 520px; margin-bottom: 3rem; }
 
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.25rem;
    }
    .service-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 1.75rem;
      transition: border-color 0.2s, transform 0.2s;
    }
    .service-card:hover { border-color: var(--accent2); transform: translateY(-3px); }
    .service-icon {
      width: 44px; height: 44px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; margin-bottom: 1rem;
    }
    .icon-blue { background: rgba(0,212,255,0.1); }
    .icon-purple { background: rgba(123,97,255,0.1); }
    .icon-green { background: rgba(0,229,123,0.1); }
    .icon-orange { background: rgba(255,165,0,0.1); }
    .service-card h3 {
      font-family: var(--font-head); font-size: 1.05rem;
      font-weight: 600; margin-bottom: 0.5rem;
    }
    .service-card p { color: var(--muted); font-size: 0.9rem; line-height: 1.6; }
 
    .notice-box {
      margin-top: 2rem;
      background: rgba(255,165,0,0.06);
      border: 1px solid rgba(255,165,0,0.25);
      border-radius: 10px; padding: 1.25rem 1.5rem;
      display: flex; align-items: flex-start; gap: 0.75rem;
    }
    .notice-box .icon { font-size: 1.2rem; flex-shrink: 0; margin-top: 2px; }
    .notice-box p { color: #FFB347; font-size: 0.88rem; line-height: 1.6; }
    .notice-box strong { color: #FFD080; }
 
    /* ── VLOGS ── */
    #vlogs { border-top: 1px solid var(--border); }
 
    .vlogs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.25rem;
    }
    .vlog-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
      text-decoration: none; color: inherit;
      display: block;
    }
    .vlog-card:hover { border-color: var(--accent2); transform: translateY(-3px); }
    .vlog-thumb {
      aspect-ratio: 16/9; background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .vlog-thumb-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #1C202B 0%, #252933 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0.5rem; color: var(--muted);
    }
    .play-btn {
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(0,212,255,0.15);
      border: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      transition: background 0.2s;
    }
    .vlog-card:hover .play-btn { background: rgba(0,212,255,0.3); }
    .vlog-thumb-placeholder span { font-size: 0.8rem; }
    .vlog-info { padding: 1.25rem; }
    .vlog-tag {
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--accent2); margin-bottom: 0.4rem;
    }
    .vlog-info h3 {
      font-family: var(--font-head); font-size: 0.98rem;
      font-weight: 600; margin-bottom: 0.4rem; line-height: 1.4;
    }
    .vlog-info p { color: var(--muted); font-size: 0.83rem; }
 
    .vlog-cta-row {
      margin-top: 2rem; text-align: center;
    }
 
    /* ── CONTACT ── */
    #contact { border-top: 1px solid var(--border); }
 
    .contact-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: start;
    }
    @media (max-width: 720px) { .contact-wrap { grid-template-columns: 1fr; } }
 
    .contact-info h2 {
      font-family: var(--font-head); font-size: 1.8rem;
      font-weight: 700; margin-bottom: 0.75rem;
    }
    .contact-info p { color: var(--muted); line-height: 1.7; margin-bottom: 1.5rem; }
 
    .contact-bullets { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
    .contact-bullets li {
      display: flex; align-items: center; gap: 0.65rem;
      font-size: 0.9rem; color: var(--text);
    }
    .contact-bullets li .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); flex-shrink: 0;
    }
 
    .contact-form {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 2rem;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
 
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
    .form-group label {
      font-size: 0.82rem; font-weight: 600; color: var(--muted);
      letter-spacing: 0.03em;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 0.7rem 0.9rem;
      color: var(--text); font-family: var(--font-body); font-size: 0.9rem;
      outline: none; transition: border-color 0.2s;
      width: 100%;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 120px; }
    .form-group select option { background: var(--card); }
 
    .submit-btn {
      width: 100%;
      background: var(--accent); color: #0D0F14;
      border: none; border-radius: 8px;
      padding: 0.85rem; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s, transform 0.15s;
      font-family: var(--font-body);
    }
    .submit-btn:hover { opacity: 0.88; transform: translateY(-1px); }
 
    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 1.5rem; text-align: center;
      color: var(--muted); font-size: 0.85rem;
    }
    footer a { color: var(--accent); text-decoration: none; }
 
    /* ── MOBILE NAV ── */
    .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 0; }
    .hamburger span { display: block; width: 22px; height: 2px; background: var(--text); margin: 5px 0; border-radius: 2px; transition: 0.3s; }
 
    @media (max-width: 640px) {
      .nav-links { display: none; }
      .hamburger { display: block; }
    }
 
    /* success state */
    .form-success {
      display: none;
      text-align: center; padding: 2rem;
    }
